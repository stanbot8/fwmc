# Phase 1: Open-loop simulation baseline
# Run the digital twin without biological I/O to validate dynamics.
# This establishes the baseline spike rates and activity patterns
# before connecting to a real fly.

name = phase1_openloop_baseline
fly_strain = w1118_GCaMP8f
notes = Open-loop baseline for mushroom body circuit

# Simulation parameters
dt_ms = 0.1
duration_ms = 10000
weight_scale = 1.0
metrics_interval = 1000

# Neuron model
enable_stdp = true

# Bridge mode: 0 = open-loop, 1 = shadow, 2 = closed-loop
bridge_mode = 0

# Data paths
connectome_dir = data
output_dir = results/phase1_baseline

# Recording
record_spikes = true
record_voltages = false
record_shadow_metrics = false
record_per_neuron_error = false
recording_interval = 10

# Monitor specific neurons (indices of interest)
monitor_neurons = 0 1 2 3 4 5 10 50 100

# Stimulus protocol: odor pulse to projection neurons
stimulus: odor_A 1000 2000 0.8 0,1,2,3,4
stimulus: odor_A 4000 5000 0.8 0,1,2,3,4
stimulus: odor_B 7000 8000 0.6 5,6,7,8,9
