# Mushroom body shadow-mode validation experiment
#
# Goal: Run the digital twin in shadow mode against the mushroom body
# circuit, measure prediction accuracy of MBON output given KC input.
#
# This experiment tests whether the simulator can predict mushroom body
# output neuron (MBON) firing patterns from Kenyon cell (KC) inputs
# during a simulated odor learning protocol.
#
# Expected workflow:
#   1. Load mushroom body connectome (KCs, MBONs, DANs)
#   2. Run shadow mode with recorded or simulated bio readings
#   3. Measure drift between digital twin and biological recordings
#   4. Evaluate validation metrics (F1, correlation, van Rossum distance)
#
# Usage:
#   ./fwmc --experiment examples/mb_shadow_validation.cfg

name = mb_shadow_validation
notes = Shadow-mode validation of mushroom body MBON prediction accuracy

# Data source: parametric mushroom body
connectome = examples/parametric_mushroom_body.brain
weight_scale = 0.3

# Simulation parameters
dt = 0.1
duration = 30000
metrics_interval = 1000

# Bridge configuration: shadow mode (observe, no write-back)
bridge_mode = shadow
shadow_interval = 10
actuation_interval = 50

# Monitor all MBONs (indices set by brain spec)
# In the parametric_mushroom_body.brain spec:
#   MB region: 2000 KCs (indices 0-1999)
#   MBON region: 30 neurons (indices 2000-2029)
#   DAN region: 20 neurons (indices 2030-2049)
monitor_start = 2000
monitor_end = 2049

# Replacement thresholds (not used in shadow mode, but configured for reference)
monitor_threshold = 0.6
bridge_threshold = 0.8
resync_threshold = 0.4
min_observation_ms = 10000

# Calibration: apply gradient updates every 10K steps
calibration_interval = 10000
calibration_lr = 0.001

# STDP: enable for learning dynamics
stdp = true

# Validation: record spike trains for post-hoc analysis
enable_validation = true

# Recording
record_spikes = true
record_voltages = false
record_shadow_metrics = true
record_per_neuron_error = true
recording_interval = 1
output_dir = results/mb_shadow

# Stimulus protocol: odor presentation
# CS+ (odor A) paired with reward (DAN activation)
# CS- (odor B) unpaired
# Three training blocks, then test
stimulus = examples/protocols/odor_learning.stim
